version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: prahari-postgres
    environment:
      POSTGRES_DB: prahari
      POSTGRES_USER: prahari
      POSTGRES_PASSWORD: prahari
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: prahari-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
