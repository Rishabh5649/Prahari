services:
  - type: web
    name: prahari-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    rootDir: backend
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
